# Unique project identifier in SonarQube
sonar.projectKey=com.example:devops-showcase-app

# Project name displayed in SonarQube UI
sonar.projectName=DevOps Showcase App - Spring Boot CI/CD

# Project version
sonar.projectVersion=1.0.0

# Paths to source code files (comma-separated)
sonar.sources=src/main/java

# Paths to test files (comma-separated)
sonar.tests=src/test/java

# Location of Java compiled binaries (required by SonarQube analysis)
sonar.java.binaries=target/classes

# Exclusions from analysis (e.g. autogenerated files, tests, static files)
sonar.exclusions=src/main/resources/static/**,src/main/resources/templates/**

# Path to the unit test coverage report generated by JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Character encoding of the source files
sonar.sourceEncoding=UTF-8
